name: Send Weekly Fantasy Recap Email

on:
  schedule:
    # Runs at 13:00 UTC (9:00 AM EST) every Tuesday
    - cron: '0 13 * * 2'
  workflow_dispatch:
    inputs:
      test_week:
        description: 'Test Week (e.g. 14). Leave blank for current week.'
        required: false
        type: string
      test_season:
        description: 'Test Season (e.g. 2024). Leave blank for current season.'
        required: false
        type: string
      test_email:
        description: 'Test Email Override (e.g. garybalkus@gmail.com). Leave blank to send to all.'
        required: false
        type: string

jobs:
  send-email:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run recap script
      env:
        LEAGUE_ID: ${{ secrets.LEAGUE_ID }}
        SEASON: ${{ secrets.SEASON }}
        ESPN_S2: ${{ secrets.ESPN_S2 }}
        SWID: ${{ secrets.SWID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        TEST_WEEK: ${{ github.event.inputs.test_week }}
        TEST_SEASON: ${{ github.event.inputs.test_season }}
        TEST_EMAIL: ${{ github.event.inputs.test_email }}
      run: python send_weekly_recap.py
